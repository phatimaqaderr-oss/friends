<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>برای سادات 💖</title>
    <link rel="stylesheet" href="css/styleSadat.css">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;600;700&family=Lalezar&display=swap" rel="stylesheet">
</head>
<body>

    <div class="background"></div>

    <div class="card">
        <h1>سادات عزیزم 💖</h1>
        
        <p class="subtitle">دوست مهربان و دوست‌داشتنی من</p>
        
        <div class="divider"></div>
        
        <p class="message">
            مرسی که توی تمام لحظه‌ها کنارم بودی
            <br><br>
            و با حضور گرمت به من انرژی دادی.
            <br><br>
            امیدوارم زندگیت همیشه پر از آرامش،
            موفقیت و لحظه‌های قشنگ باشه.
            <br><br>
            دوستت دارم 💖
        </p>

        <div class="player">
            <button id="playButton" class="play-btn">▶</button>
            <div class="song">
                <div class="song-title">dokht mino</div>
                <div class="artist">hafez hormozi</div>
            </div>
        </div>

        <div class="progress-container">
            <div id="progress" class="progress"></div>
        </div>

        <div class="time">
            <span id="current">0:00</span>
            <span id="duration">0:00</span>
        </div>
    </div>

    <audio id="audio">
        <source src="music/sadat.mp3" type="audio/mpeg">
    </audio>

    <script src="js/script.js"></script>
</body>
</html>
