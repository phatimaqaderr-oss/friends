<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>For Dorna 💙</title>

<link rel="stylesheet" href="css/styleDorna.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&family=Great+Vibes&display=swap" rel="stylesheet">

</head>

<body>

<div class="background"></div>

<div class="card">

    <h1>For Dorna 💙</h1>

    <p class="subtitle">
        A little gift for one of my favorite people.
    </p>

    <div class="divider"></div>

    <p class="message">
        For my first friend in high school,
        <br><br>

        You made me laugh even when I was sad.
        <br><br>

        Thank you for every smile,
        every memory,
        and every little moment.

        <br><br>

        Love you so much ❤️
    </p>

    <div class="player">

        <button id="playButton" class="play-btn">

            ▶

        </button>

        <div class="song">

            <div class="song-title">

                Until I Found You

            </div>

            <div class="artist">

                Stephen Sanchez

            </div>

        </div>

    </div>

    <div class="progress-container">

        <div class="progress" id="progress"></div>

    </div>

    <div class="time">

        <span id="current">0:00</span>

        <span id="duration">0:00</span>

    </div>

</div>

<audio id="audio">

<source src="music/DORNA.mp3" type="audio/mpeg">

</audio>

<script src="js/script.js"></script>

</body>

</html>
