<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>برای معصومه 💚</title>
    <link rel="stylesheet" href="css/masoumeh.css">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;600;700&family=Lalezar&display=swap" rel="stylesheet">
</head>
<body>

    <div class="background"></div>

    <div class="card">
        <h1>معصومه عزیزم 💚</h1>
        
        <p class="subtitle">دوست پرانرژی و همیشه خندانم</p>
        
        <div class="divider"></div>
        
        <p class="message">
            مرسی از دوست عزیز و پرانرژی‌ام
            <br><br>
            که باعث خوشحالی و خنده‌ی من شدی.
            <br><br>
            امیدوارم همیشه همین‌قدر پر از انرژی،
            لبخند و حال خوب بمونی.
            <br><br>
            دوستت دارم 💚
        </p>

        <div class="player">
            <button id="playButton" class="play-btn">▶</button>
            <div class="song">
                <div class="song-title">Ey Joonam</div>
                <div class="artist">Sami Beigi</div>
            </div>
        </div>

        <div class="progress-container">
            <div id="progress" class="progress"></div>
        </div>

        <div class="time">
            <span id="current">0:00</span>
            <span id="duration">0:00</span>
        </div>
    </div>

    <audio id="audio">
        <source src="music/masoumeh.mp3" type="audio/mpeg">
    </audio>

    <script src="js/script.js"></script>
</body>
</html>
